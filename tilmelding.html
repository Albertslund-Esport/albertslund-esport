<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tilmelding - Albertslund Esport</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png" alt="Albertslund Esport logo" style="max-width: 120px;">
  <h1>Albertslund Esport</h1>
  <p>Tilmelding</p>
</header>

<nav class="navbar">
  <button class="menu-toggle">☰</button>

  <div class="nav-links">
    <a href="index.html">Forside</a>
    <a href="hold.html">Hold</a>
    <a href="vision.html">Vision</a>
    <a href="tilmelding.html" class="active">Tilmelding</a>
    <a href="omos.html">Om os</a>
  </div>
</nav>

<main>

  <section class="hero">
    <h2>Tilmeld dig Albertslund Esport 🎮</h2>
    <p>
      Udfyld formularen herunder og få en gratis prøvetræning.
    </p>
  </section>

  <section class="card">

    <form action="https://formspree.io/f/mqegebaq" method="post">

      <input type="hidden" name="_subject" value="Ny tilmelding fra Albertslund Esport">

      <label for="navn">Fulde navn</label>
      <input type="text" id="navn" name="navn" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="alder">Alder</label>
      <input type="number" id="alder" name="alder" required>

      <label for="telefon">Telefon</label>
      <input type="text" id="telefon" name="telefon">

      <label for="spil">Ønsket hold</label>
      <select id="spil" name="spil">
        <option>CS2</option>
        <option>Fortnite</option>
        <option>Begynderhold</option>
      </select>

      <label for="besked">Ekstra besked</label>
      <textarea id="besked" name="besked"></textarea>

      <button type="submit">Send tilmelding</button>

    </form>

  </section>

  <section class="card">
    <h3>Info</h3>
    <p>✔ Gratis prøvetræning</p>
    <p>✔ 100% online træning</p>
    <p>✔ Du kan starte når som helst</p>
    <p>✔ Kontingent: 199 kr / måned</p>
  </section>

</main>

<footer>
  <p>© Albertslund Esport</p>
</footer>

<!-- MENU SCRIPT -->
<script>
  const toggleButton = document.querySelector(".menu-toggle");
  const navLinks = document.querySelector(".nav-links");

  toggleButton.addEventListener("click", () => {
    navLinks.classList.toggle("show");
  });
</script>

</body>
</html>
