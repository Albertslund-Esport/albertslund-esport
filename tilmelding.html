<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tilmelding - Albertslund Esport</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <img src="logo.png" alt="Albertslund Esport logo" class="logo">
    <div class="header-text">
      <h1>Albertslund Esport</h1>
      <p>Tilmelding</p>
    </div>
  </div>
</header>

<nav class="navbar">
  <a href="index.html">Forside</a>
  <a href="hold.html">Hold</a>
  <a href="vision.html">Vision</a>
  <a href="tilmelding.html">Tilmelding</a>
</nav>

<main>
  <section class="hero">
    <h2>Tilmeld dig Albertslund Esport</h2>
    <p>Udfyld formularen herunder, så vender vi tilbage hurtigst muligt.</p>
  </section>

  <section class="card">
    <form action="https://formspree.io/f/mqegebaq" method="post">
      <input type="hidden" name="_subject" value="Ny tilmelding fra Albertslund Esport">
      <input type="hidden" name="_next" value="https://albertslund-esport.github.io/albertslund-esport/tak.html">

      <label for="navn">Fulde navn</label>
      <input type="text" id="navn" name="navn" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="alder">Alder</label>
      <input type="number" id="alder" name="alder" required>

      <label for="telefon">Telefon</label>
      <input type="text" id="telefon" name="telefon">

      <label for="spil">Ønsket hold / spil</label>
      <select id="spil" name="spil">
        <option>Fortnite</option>
        <option>CS2</option>
        <option>Begynderhold</option>
      </select>

      <label for="besked">Ekstra besked</label>
      <textarea id="besked" name="besked" rows="5"></textarea>

      <button type="submit">Send tilmelding</button>
    </form>
  </section>
</main>

<footer>
  <p>© Albertslund Esport</p>
</footer>

</body>
</html>
